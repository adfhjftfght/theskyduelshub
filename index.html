<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Owners</title>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(160deg, #0a0a0f 0%, #12121a 50%, #0f0f14 100%);
        color: #e8e8ec;
        padding: 2rem 1.5rem;
        line-height: 1.6;
    }

    .container {
        width: 100%;
        max-width: 420px;
        text-align: center;
    }

    h1 {
        font-size: 2.25rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .subtitle {
        color: #71717a;
        font-size: 0.95rem;
        margin-bottom: 2rem;
    }

.owners {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        margin-bottom: 2.5rem;
    }

    .owners p {
        /* less button-like */
        background: transparent;
        border: none;
        border-radius: 10px;
        padding: 0.35rem 0.65rem;
        font-size: 0.88rem;
        font-weight: 600;
        color: #f4f4f5;
        line-height: 1.15;
        transition: background 0.2s ease;
    }

    .owners p:hover {
        background: rgba(255, 255, 255, 0.03);
    }

    .actions {
        display: flex;
        flex-direction: column;
        gap: 0.875rem;
    }

    button {
        width: 100%;
        padding: 0.95rem 1.5rem;
        font-size: 0.95rem;
        font-weight: 600;
        font-family: inherit;
        letter-spacing: 0.01em;
        color: #fff;
        background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        box-shadow: 0 4px 20px rgba(99, 102, 241, 0.35);
    }

    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 28px rgba(99, 102, 241, 0.45);
    }

    button:active {
        transform: translateY(0);
    }

    #store {
        background: linear-gradient(135deg, #18181b 0%, #27272a 100%);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.1);
    }

    #store:hover {
        background: linear-gradient(135deg, #27272a 0%, #3f3f46 100%);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        border-color: rgba(255, 255, 255, 0.18);
    }
    .small {
        padding: 0.6rem 1rem;
        font-size: 0.85rem;
        font-weight: 600;
        border-radius: 10px;
        background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
        box-shadow: 0 3px 12px rgba(6, 182, 212, 0.18);
    }

    .small:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(6, 182, 212, 0.22);
    }
</style>
    </head>
    <body>
        <script>
            function db() {
  window.location.href = "https://adfhjftfght.github.io/skyduels/";
}
function store() {
  window.location.href = "https://adfhjftfght.github.io/skyduels-store/";
}
        </script>
        <div class="container">
            <h1>Skyduels</h1>
            <h1>Owners</h1>
            <div class="owners">
                <p>Seraph</p>
                <p>Nate</p>
            </div>
            <div class="actions">
                <button onclick="db()" id="db">card and account database</button>
                <button onclick="store()" id="store">store</button>
                <button onclick="window.location.href='https://example.com'" id="temp" class="small">temporary link</button>
            </div>
        </div>
    </body>
</html>
